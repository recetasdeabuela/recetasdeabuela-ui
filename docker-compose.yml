name: recetas-de-abuela

services:
  app:
    build:
      context: .
    ports:
      - "4321:4321"
    volumes:
      # Mount project source for hot-reload
      - .:/app
      # Use a named volume for node_modules so host doesn't override container's
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

volumes:
  node_modules:
